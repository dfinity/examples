[toolchain]
moc = "1.9.0"

[dependencies]
core = "2.5.0"

[moc]
# M0236: use context dot notation
# M0237: redundant explicit implicit arguments
# M0223: redundant type instantiation
# M0195: actor(id) in subscribe() implicitly uses system capability; safe because
#         subscribe() is a public actor function (system capability is implicit) and
#         the principal comes from a trusted icp-cli-injected environment variable
args = ["--default-persistent-actors", "-W=M0236,M0237,M0223,M0195"]

[canisters.publisher]
main = "publisher/app.mo"

[canisters.subscriber]
main = "subscriber/app.mo"
