[toolchain]
moc = "1.9.0"

[dependencies]
core = "2.5.0"

[moc]
# M0236: use context dot notation
# M0237: redundant explicit implicit arguments
# M0223: redundant type instantiation
# M0195 (actor(id) requires system capability) is handled by declaring publisher()
# with <system> type parameter — the warning still prints but does not block the build.
args = ["--default-persistent-actors", "-W=M0236,M0237,M0223"]

[canisters.publisher]
main = "publisher/app.mo"

[canisters.subscriber]
main = "subscriber/app.mo"
