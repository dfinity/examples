canisters:
  - name: backend
    recipe:
      type: "@dfinity/motoko@v5.0.0"

networks:
  - name: local
    mode: managed
    image: basic-bitcoin-launcher
    port-mapping:
      - 0:4943      # IC gateway (dynamic)
      - 18443:18443 # bitcoind JSON-RPC (fixed, used by Makefile for mining)

environments:
  - name: local
    network: local
    init_args:
      backend: "(variant { regtest })"

  - name: staging
    network: ic
    init_args:
      backend: "(variant { testnet })"

  - name: production
    network: ic
    init_args:
      backend: "(variant { mainnet })"
