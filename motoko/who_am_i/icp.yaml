networks:
  - name: local
    mode: managed
    ii: true

canisters:
  - name: backend
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: src/backend/main.mo
        candid: src/backend/backend.did

  - name: frontend
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        dir: src/frontend/dist
        build:
          - npm install --prefix src/frontend
          - npm run build --prefix src/frontend
