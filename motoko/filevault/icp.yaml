networks:
  - name: local
    mode: managed
    ii: true

canisters:
  - name: backend
    recipe:
      type: "@dfinity/motoko@v5.0.0"

  - name: frontend
    recipe:
      type: "@dfinity/asset-canister@v2.2.1"
      configuration:
        dir: frontend/dist
        build:
          - npm install --prefix frontend
          - npm run build --prefix frontend
