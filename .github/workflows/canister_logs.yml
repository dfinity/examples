name: canister_logs

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - motoko/canister_logs/**
      - rust/canister_logs/**
      - .github/workflows/canister_logs.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-canister_logs:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: motoko
      working-directory: motoko/canister_logs
      run: |
        icp network start -d
        icp deploy
        bash test.sh

  rust-canister_logs:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: rust
      working-directory: rust/canister_logs
      run: |
        icp network start -d
        icp deploy
        bash test.sh
