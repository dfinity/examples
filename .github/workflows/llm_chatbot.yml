name: llm_chatbot

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - motoko/llm_chatbot/**
      - rust/llm_chatbot/**
      - .github/workflows/llm_chatbot.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-llm_chatbot:
    runs-on: ubuntu-24.04
    container: ghcr.io/dfinity/icp-dev-env-motoko:1.0.1
    env:
      ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Deploy
        working-directory: motoko/llm_chatbot
        run: |
          icp network start -d
          icp deploy

  rust-llm_chatbot:
    runs-on: ubuntu-24.04
    container: ghcr.io/dfinity/icp-dev-env-rust:1.0.1
    env:
      ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Deploy
        working-directory: rust/llm_chatbot
        run: |
          icp network start -d
          icp deploy
