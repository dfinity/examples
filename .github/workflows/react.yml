name: react
on:
  push:
    branches: [master]
  pull_request:
    paths:
      - hosting/react/**
      - .github/workflows/react.yml
      - .github/workflows/_run-example.yml
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  react:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: all
      working-directory: hosting/react
      run: |
        icp network start -d
        icp deploy
