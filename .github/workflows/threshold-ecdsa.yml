name: threshold-ecdsa

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - motoko/threshold-ecdsa/**
      - rust/threshold-ecdsa/**
      - .github/workflows/threshold-ecdsa.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-threshold-ecdsa:
    runs-on: ubuntu-24.04
    container: ghcr.io/dfinity/icp-dev-env-motoko:1.0.1
    env:
      ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Deploy and test
        working-directory: motoko/threshold-ecdsa
        run: |
          icp network start -d
          icp deploy
          make test

  rust-threshold-ecdsa:
    runs-on: ubuntu-24.04
    container: ghcr.io/dfinity/icp-dev-env-rust:1.0.1
    env:
      ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Deploy and test
        working-directory: rust/threshold-ecdsa
        run: |
          icp network start -d
          icp deploy
          bash test.sh
