name: threshold-ecdsa

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - motoko/threshold-ecdsa/**
      - rust/threshold-ecdsa/**
      - .github/workflows/threshold-ecdsa.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-threshold-ecdsa:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: motoko
      working-directory: motoko/threshold-ecdsa
      run: |
        icp network start -d
        icp deploy
        bash test.sh

  rust-threshold-ecdsa:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: rust
      working-directory: rust/threshold-ecdsa
      run: |
        icp network start -d
        icp deploy
        bash test.sh
