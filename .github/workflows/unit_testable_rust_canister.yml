name: unit_testable_rust_canister

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - rust/unit_testable_rust_canister/**
      - .github/workflows/unit_testable_rust_canister.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-unit_testable_rust_canister:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: rust
      working-directory: rust/unit_testable_rust_canister
      run: |
        cargo test --package backend --lib
        cargo build --package backend --target wasm32-unknown-unknown --release
        cargo test --package backend --test integration_tests
        icp network start -d
        icp deploy
        bash test.sh
      install-pocketic: true
