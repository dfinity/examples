name: ic_pos

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - motoko/ic-pos/**
      - .github/workflows/ic_pos.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-ic_pos:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: motoko
      working-directory: motoko/ic-pos
      run: |
        icp network start -d
        bash deploy.sh
        bash test.sh
