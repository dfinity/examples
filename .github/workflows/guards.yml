name: guards

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - rust/guards/**
      - .github/workflows/guards.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-guards:
    runs-on: ubuntu-24.04
    container: ghcr.io/dfinity/icp-dev-env-rust:1.0.1
    env:
      ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Deploy and test (icp-cli)
        working-directory: rust/guards
        run: |
          icp network start -d
          icp deploy
          bash test.sh
      - name: Download PocketIC server
        run: |
          curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://github.com/dfinity/pocketic/releases/download/14.0.0/pocket-ic-x86_64-linux.gz \
            | gunzip > /usr/local/bin/pocket-ic-server
          chmod +x /usr/local/bin/pocket-ic-server
          echo "POCKET_IC_BIN=/usr/local/bin/pocket-ic-server" >> $GITHUB_ENV
      - name: Build WASM and run PocketIC tests
        working-directory: rust/guards
        run: |
          cargo build --package backend --target wasm32-unknown-unknown --release
          cargo test --package backend
