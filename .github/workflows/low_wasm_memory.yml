name: low_wasm_memory

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - motoko/low_wasm_memory/**
      - rust/low_wasm_memory/**
      - .github/workflows/low_wasm_memory.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-low_wasm_memory:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: motoko
      working-directory: motoko/low_wasm_memory
      run: |
        icp network start -d
        icp deploy
        bash test.sh

  rust-low_wasm_memory:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: rust
      working-directory: rust/low_wasm_memory
      run: |
        icp network start -d
        icp deploy
        bash test.sh
