name: basic_bitcoin

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - motoko/basic_bitcoin/**
      - .github/workflows/basic_bitcoin.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-basic_bitcoin:
    runs-on: ubuntu-24.04
    container: ghcr.io/dfinity/icp-dev-env-motoko:0.3.2
    env:
      ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
      - name: Build network launcher image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: motoko/basic_bitcoin
          push: false
          load: true
          tags: basic-bitcoin-launcher:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy and test
        working-directory: motoko/basic_bitcoin
        run: |
          icp network start -d
          icp deploy --cycles 30t
          make test
