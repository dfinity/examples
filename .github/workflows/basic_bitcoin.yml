name: basic_bitcoin

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - motoko/basic_bitcoin/**
      - .github/workflows/basic_bitcoin.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-basic_bitcoin:
    # Run directly on the host (no container:) so that icp-cli can bind-mount
    # the status directory into our custom Docker image. When icp-cli runs inside
    # a container, the tmpdir it creates is invisible to the host Docker daemon.
    runs-on: ubuntu-24.04
    env:
      ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install icp-cli, ic-wasm and mops
        run: npm install -g @icp-sdk/icp-cli @icp-sdk/ic-wasm ic-mops
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
      - name: Build network launcher image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: motoko/basic_bitcoin
          push: false
          load: true
          tags: icp-cli-network-launcher-bitcoin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy and test
        working-directory: motoko/basic_bitcoin
        run: |
          icp network start -d
          icp deploy --cycles 30t
          make test

  motoko-basic_bitcoin-macos:
    # Tracks arm64 Apple Silicon compatibility. Currently expected to fail due to
    # a canister_status Candid decode error on the arm64 icp-cli-network-launcher
    # image (log_memory_store_size field not supported by icp-cli 0.3.2).
    # Tracked in: https://github.com/dfinity/icp-cli/issues/601
    # Remove continue-on-error once that issue is resolved.
    runs-on: macos-latest
    continue-on-error: true
    env:
      ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install icp-cli, ic-wasm and mops
        run: npm install -g @icp-sdk/icp-cli @icp-sdk/ic-wasm ic-mops
      - name: Start Docker via colima
        run: |
          brew install colima docker docker-buildx
          colima start --vm-type=vz --cpu 2 --memory 4
          echo "DOCKER_HOST=unix://${HOME}/.colima/default/docker.sock" >> "$GITHUB_ENV"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
      - name: Build network launcher image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: motoko/basic_bitcoin
          push: false
          load: true
          tags: icp-cli-network-launcher-bitcoin:latest
      - name: Deploy and test
        working-directory: motoko/basic_bitcoin
        run: |
          icp network start -d
          icp deploy --cycles 30t
          make test
