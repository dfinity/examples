name: rust-vetkeys-password-manager
on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - rust/vetkeys/password_manager/**
      - .github/workflows/provision-darwin.sh
      - .github/workflows/provision-linux.sh
      - .github/workflows/password-manager-example.yml
      - .ic-commit
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  password-manager-rust-darwin:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@50fbc622fc4ef5163becd7fab6573eac35f8462e # v1.2.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Provision Darwin
        run: bash .github/workflows/provision-darwin.sh
      - name: Pre-download network launcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/workflows/pre-download-launcher.sh
      - name: Deploy Password Manager Rust Darwin
        env:
          ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eExuo pipefail
          cargo install candid-extractor --locked
          pushd rust/vetkeys/password_manager/rust
          icp network start -d && icp deploy
          popd
  password-manager-rust-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@50fbc622fc4ef5163becd7fab6573eac35f8462e # v1.2.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Provision Linux
        run: bash .github/workflows/provision-linux.sh
      - name: Pre-download network launcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/workflows/pre-download-launcher.sh
      - name: Deploy Password Manager Rust Linux
        env:
          ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eExuo pipefail
          cargo install candid-extractor --locked
          pushd rust/vetkeys/password_manager/rust
          icp network start -d && icp deploy
          popd
  password-manager-motoko-darwin:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@50fbc622fc4ef5163becd7fab6573eac35f8462e # v1.2.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Provision Darwin
        run: bash .github/workflows/provision-darwin.sh
      - name: Pre-download network launcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/workflows/pre-download-launcher.sh
      - name: Deploy Password Manager Motoko Darwin
        env:
          ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eExuo pipefail
          cargo install candid-extractor --locked
          pushd rust/vetkeys/password_manager/motoko/backend
          icp network start -d && icp deploy
          popd
  password-manager-motoko-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@50fbc622fc4ef5163becd7fab6573eac35f8462e # v1.2.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Provision Linux
        run: bash .github/workflows/provision-linux.sh
      - name: Pre-download network launcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/workflows/pre-download-launcher.sh
      - name: Deploy Password Manager Motoko Linux
        env:
          ICP_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eExuo pipefail
          cargo install candid-extractor --locked
          pushd rust/vetkeys/password_manager/motoko/backend
          icp network start -d && icp deploy
          popd
