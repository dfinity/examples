name: stake_neuron_from_cli

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - rust/stake_neuron_from_cli/**
      - .github/workflows/stake_neuron_from_cli.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-stake_neuron_from_cli:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: rust
      working-directory: rust/stake_neuron_from_cli
      run: |
        icp network start -d
        bash test.sh
