name: superheroes

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - motoko/superheroes/**
      - .github/workflows/superheroes.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-superheroes:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: motoko
      working-directory: motoko/superheroes
      run: |
        icp network start -d
        icp deploy
        bash test.sh
