name: vetkeys-basic-vetkd

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - motoko/vetkeys/basic_vetkd/**
      - rust/vetkeys/basic_vetkd/**
      - .github/workflows/vetkeys-basic-vetkd.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: motoko
      working-directory: motoko/vetkeys/basic_vetkd
      run: |
        icp network start -d
        icp deploy
        bash test.sh

  rust:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: rust
      working-directory: rust/vetkeys/basic_vetkd
      run: |
        icp network start -d
        icp deploy
        bash test.sh
