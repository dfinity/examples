name: exchange-rates

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - rust/exchange-rates/**
      - .github/workflows/exchange-rates.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-exchange-rates:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: rust
      working-directory: rust/exchange-rates
      run: |
        icp network start -d
        icp deploy
        bash test.sh
