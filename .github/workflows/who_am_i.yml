name: who_am_i

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - motoko/who_am_i/**
      - rust/who_am_i/**
      - .github/workflows/who_am_i.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-who_am_i:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: motoko
      working-directory: motoko/who_am_i
      run: |
        icp network start -d
        icp deploy
        bash test.sh

  rust-who_am_i:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: rust
      working-directory: rust/who_am_i
      run: |
        icp network start -d
        icp deploy
        bash test.sh
