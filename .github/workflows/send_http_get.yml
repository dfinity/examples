name: send_http_get

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - motoko/send_http_get/**
      - rust/send_http_get/**
      - .github/workflows/send_http_get.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  motoko-send_http_get:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: motoko
      working-directory: motoko/send_http_get
      run: |
        icp network start -d
        icp deploy
        bash test.sh

  rust-send_http_get:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: rust
      working-directory: rust/send_http_get
      run: |
        icp network start -d
        icp deploy
        bash test.sh
