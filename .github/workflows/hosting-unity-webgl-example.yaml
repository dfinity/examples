name: hosting-unity-webgl

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - hosting/unity-webgl-template/**
      - .github/workflows/hosting-unity-webgl-example.yaml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hosting-unity-webgl:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: all
      working-directory: hosting/unity-webgl-template
      run: |
        # Brotli-compressing the large Unity WebGL asset bundle exceeds the
        # default 60s plugin compute limit; raise it for the asset sync.
        export ICP_CLI_PLUGIN_COMPUTE_LIMIT_SECS=300
        icp network start -d
        icp deploy
