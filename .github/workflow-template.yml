# Workflow template for ICP examples.
# Copy this file to .github/workflows/<example_name>.yml and replace the placeholders.
#
# Examples run inside the ICP dev-env container via the reusable _run-example.yml
# workflow, which is the single source of truth for the dev-env image version.
#
# PLACEHOLDERS:
#   <example_name>   e.g. hello_world
#   <language>       motoko | rust | all   (use "all" for frontend-only examples)
#   <working-dir>    e.g. motoko/hello_world  (for frontend-only: hosting/<name>)
#
# For a two-language example, add one job per language (e.g. motoko-<example_name>
# and rust-<example_name>). Examples that need a PocketIC server for integration
# tests can set `install-pocketic: true` (and optionally `pocketic-version`).

name: <example_name>

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - <working-dir>/**
      - .github/workflows/<example_name>.yml
      - .github/workflows/_run-example.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  <language>-<example_name>:
    uses: ./.github/workflows/_run-example.yml
    with:
      language: <language>
      working-directory: <working-dir>
      run: |
        icp network start -d
        icp deploy
        bash test.sh
