<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <title>QR code generator</title>
  <base href="/" />
  <link rel="icon" href="favicon.ico" />
  <style>
    body {
      font-family: sans-serif;
    }

    form {
      display: flex;
      justify-content: center;
      max-width: 80vw;
      margin: auto;
    }

    div {
      display: flex;
      max-width: 80vw;
      flex-flow: column;
      align-items: baseline;
      row-gap: 20px;
    }

    img {
      max-width: 80vw;
      border: 1px solid #555;
      background-color: #ddd;
    }

    .qrcode {
      border: 1px solid #555;
    }

    h1 {
      font-size: 100%;
    }

    textarea {
      margin-top: -20px;
      max-width: 80vw;
    }

    .option {
      display: flex;
      flex-flow: row;
      justify-content: left;
      align-items: center;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 42px;
      height: 18px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      border-radius: 18px;
      transition: 0.4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 1px;
      bottom: 1px;
      background-color: white;
      border-radius: 50%;
      transition: 0.4s;
    }

    input:checked + .slider {
      background-color: #b11dbb;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .clean-button {
      display: inline-block;
      padding: 5px 10px;
      border: 2px solid #a10dab;
      border-radius: 4px;
      background-color: #b11dbb;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s, color 0.2s, border-color 0.2s;
    }

    .clean-button:disabled {
      background-color: #ccc;
      border-color: #ccc;
    }
  </style>
  <script type="module" src="./src/main.js"></script>
</head>

<body>
  <form>
    <div>
      <h1>QR code generator</h1>
      <textarea id="text" cols=60 rows=4 placeholder="Enter text"></textarea>
      <div class="option">
        <label>
          <div class="toggle-switch">
            <input type="checkbox" id="logo" checked>
            <span class="slider"></span>
          </div>
          &nbsp; add logo
        </label>
      </div>
      <div class="option">
        <label>
          <div class="toggle-switch">
            <input type="checkbox" id="gradient" checked>
            <span class="slider"></span>
          </div>
          &nbsp; add gradient
        </label>
      </div>
      <div class="option">
        <label>
          <div class="toggle-switch">
            <input type="checkbox" id="transparent">
            <span class="slider"></span>
          </div>
          &nbsp; make transparent
        </label>
      </div>
      <div class="option">
        <label>
          <div class="toggle-switch">
            <input type="checkbox" id="consensus">
            <span class="slider"></span>
          </div>
          &nbsp; wait for blockchain consensus
        </label>
      </div>
      <button class="clean-button" id="generate">Generate!</button>
      <div>
        <div id="message"></div>
        <a id="download" download="qrcode.png">
          <img id="qrcode" class="qrcode"></img>
        </a>
      </div>
    </div>
  </form>
</body>

</html>
