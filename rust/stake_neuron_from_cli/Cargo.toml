[package]
name = "stake_neuron_from_cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "stake_neuron_from_cli"
path = "src/main.rs"

[dependencies]
candid = "0.10"
clap = { version = "4", features = ["derive"] }
# pem: enables from_pem on identity types.
# ring: enables Secp256k1Identity (needed for keys generated by icp-cli).
ic-agent = { version = "0.47", features = ["pem", "ring"] }
ic-ledger-types = "0.16"
serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
tokio = { version = "1", features = ["full"] }
