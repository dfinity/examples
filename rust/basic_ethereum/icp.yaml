canisters:
  - name: backend
    recipe:
      type: "@dfinity/rust@v3.3.0"

  - name: evm_rpc
    build:
      steps:
        - type: pre-built
          url: https://github.com/dfinity/evm-rpc-canister/releases/download/evm_rpc-v2.8.0/evm_rpc.wasm.gz
    # nodesInSubnet controls how many cycles the EVM RPC canister charges per request
    # (each node in a subnet independently makes the HTTPS outcall, so cost scales with N).
    # Using the production value (28) locally validates that the cycle amounts in the
    # backend are sufficient for a real subnet, even though PocketIC only runs 1 node.
    init_args: "(record { nodesInSubnet = 28 })"

environments:
  # Local: deploys both backend and evm_rpc (pre-built).
  # icp-cli auto-injects PUBLIC_CANISTER_ID:evm_rpc into the backend after deploying evm_rpc.
  # Defaults: Sepolia + test_key_1.
  - name: local
    network: local

  # Staging: backend only on ICP mainnet, Sepolia + test_key_1 (same as local defaults).
  # Points to the shared EVM RPC canister already running on ICP mainnet.
  - name: staging
    network: ic
    canisters: [backend]
    settings:
      backend:
        environment_variables:
          "PUBLIC_CANISTER_ID:evm_rpc": "7hfb6-caaaa-aaaar-qadga-cai"

  # Production: backend only on ICP mainnet, Ethereum mainnet + production ECDSA key.
  - name: production
    network: ic
    canisters: [backend]
    init_args:
      backend: "(opt record {ethereum_network = opt variant {Mainnet}; ecdsa_key_name = opt variant {ProductionKey1}})"
    settings:
      backend:
        environment_variables:
          "PUBLIC_CANISTER_ID:evm_rpc": "7hfb6-caaaa-aaaar-qadga-cai"
