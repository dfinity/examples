networks:
  - name: local
    mode: managed

canisters:
  - name: backend
    recipe:
      type: "@dfinity/rust@v3.3.0"

  - name: evm_rpc
    build:
      steps:
        - type: pre-built
          url: https://github.com/dfinity/evm-rpc-canister/releases/download/v2.2.0/evm_rpc.wasm.gz
    init_args: "(record { nodesInSubnet = 28 })"
