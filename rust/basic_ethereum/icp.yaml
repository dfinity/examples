canisters:
  - name: backend
    recipe:
      type: "@dfinity/rust@v3.3.0"

  - name: evm_rpc
    build:
      steps:
        - type: pre-built
          url: https://github.com/dfinity/evm-rpc-canister/releases/download/v2.8.0/evm_rpc.wasm.gz
    init_args: "(record { nodesInSubnet = 28 })"

# EVM_RPC_CANISTER_ID is injected as a canister environment variable at deploy time.
# Locally, icp-cli injects PUBLIC_CANISTER_ID:evm_rpc automatically after deploying the
# pre-built canister above. On mainnet, the production environment sets it to the
# shared EVM RPC canister (7hfb6-caaaa-aaaar-qadga-cai).
environments:
  - name: local
    network: local

  - name: production
    network: ic
    settings:
      backend:
        environment_variables:
          EVM_RPC_CANISTER_ID: "7hfb6-caaaa-aaaar-qadga-cai"
