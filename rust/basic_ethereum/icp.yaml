canisters:
  - name: backend
    recipe:
      type: "@dfinity/rust@v3.3.0"

  - name: evm_rpc
    build:
      steps:
        - type: pre-built
          url: https://github.com/dfinity/evm-rpc-canister/releases/download/evm_rpc-v2.8.0/evm_rpc.wasm.gz
    init_args: "(record { nodesInSubnet = 28 })"

environments:
  # Local: deploys both backend and evm_rpc (pre-built).
  # icp-cli auto-injects PUBLIC_CANISTER_ID:evm_rpc into the backend after deploying evm_rpc.
  - name: local
    network: local

  # Staging: deploys only backend on ICP mainnet.
  # Points to the shared EVM RPC canister on ICP mainnet, uses Sepolia and the test ECDSA key.
  - name: staging
    network: ic
    canisters: [backend]
    init_args:
      backend: "(opt record {ethereum_network = opt variant {Sepolia}; ecdsa_key_name = opt variant {TestKey1}})"
    settings:
      backend:
        environment_variables:
          "PUBLIC_CANISTER_ID:evm_rpc": "7hfb6-caaaa-aaaar-qadga-cai"

  # Production: deploys only backend on ICP mainnet.
  # Points to the shared EVM RPC canister on ICP mainnet, uses Ethereum mainnet and the production ECDSA key.
  - name: production
    network: ic
    canisters: [backend]
    init_args:
      backend: "(opt record {ethereum_network = opt variant {Mainnet}; ecdsa_key_name = opt variant {ProductionKey1}})"
    settings:
      backend:
        environment_variables:
          "PUBLIC_CANISTER_ID:evm_rpc": "7hfb6-caaaa-aaaar-qadga-cai"
