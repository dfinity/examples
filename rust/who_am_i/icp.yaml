networks:
  - name: local
    mode: managed
    ii: true

canisters:
  - name: backend
    recipe:
      type: "@dfinity/rust@v3.2.0"
      configuration:
        package: backend
        candid: src/backend/backend.did

  - name: frontend
    recipe:
      type: "@dfinity/static-site@v0.3.0"
      configuration:
        dir: src/frontend/dist
        build:
          - npm install --prefix src/frontend
          - npm run build --prefix src/frontend
