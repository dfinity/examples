canisters:
  - name: backend
    recipe:
      type: "@dfinity/rust@v3.3.0"

networks:
  - name: local
    mode: managed
    image: icp-cli-network-launcher-bitcoin
    port-mapping:
      - 0:4943      # IC gateway (dynamic)

environments:
  - name: local
    network: local
    init_args:
      backend: "(variant { regtest })"

  - name: staging
    network: ic
    init_args:
      backend: "(variant { testnet })"

  - name: production
    network: ic
    init_args:
      backend: "(variant { mainnet })"
