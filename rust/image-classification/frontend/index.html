<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <title>ICP image classification</title>
  <base href="/" />
  <link rel="icon" href="assets/favicon.ico" />
  <link type="text/css" rel="stylesheet" href="assets/main.css" />
  <script type="module" src="src/main.js"></script>
</head>

<body>
  <form>
    <div>
      <h1>ICP image classification</h1>
      <label id="filelabel" for="file" class="clickable">
        <img id="image" class="image placeholder" src="assets/logo_transparent.png"></img>
      </label>
      <p id="upload-hint" class="upload-hint">↑ Click to upload a PNG or JPEG image</p>
      <input id="file" class="file" name="file" type="file" accept="image/png, image/jpeg" />
      <div id="container">
        <div id="message"></div>
        <div class="option invisible" id="replicated_option">
          <label>
            <div class="toggle-switch">
              <input type="checkbox" id="replicated">
              <span class="slider"></span>
            </div>
            &nbsp; replicated execution
          </label>
        </div>
        <img id="loader" src="assets/loader.svg" class="loader invisible" />
        <button id="classify" class="clean-button invisible" disabled>Go!</button>
      </div>
    </div>
  </form>
</body>

</html>
