canisters:
  - name: backend
    build:
      steps:
        - type: script
          commands:
            - cargo build --release --target=wasm32-wasip1
            - wasi2ic ./target/wasm32-wasip1/release/backend.wasm ./target/wasm32-wasip1/release/backend-ic.wasm
            - wasm-opt -Os -o ./target/wasm32-wasip1/release/backend-ic.wasm ./target/wasm32-wasip1/release/backend-ic.wasm
            - cp ./target/wasm32-wasip1/release/backend-ic.wasm "$ICP_WASM_OUTPUT_PATH"
            - ic-wasm "$ICP_WASM_OUTPUT_PATH" -o "$ICP_WASM_OUTPUT_PATH" metadata candid:service -f backend/backend.did -v public --keep-name-section

  - name: frontend
    recipe:
      type: "@dfinity/asset-canister@v2.2.1"
      configuration:
        dir: frontend/dist
        build:
          - npm install --prefix frontend
          - npm run build --prefix frontend
